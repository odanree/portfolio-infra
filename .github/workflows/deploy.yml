name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: "Rebuild every service regardless of what changed"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          FORCE_REBUILD: ${{ inputs.rebuild_all }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}
          envs: FORCE_REBUILD
          # A scoped deploy normally rebuilds at most one service, but a forced
          # full rebuild can take a while; the default 10m command timeout is
          # too short.
          command_timeout: 30m
          script: |
            # Fail the deploy on ANY error. Without this, a mid-script failure
            # (e.g. a build error or disk-full) is swallowed and the workflow
            # reports success while containers keep running stale images — which
            # is exactly how a pushed fix silently failed to deploy.
            set -euo pipefail

            # Map each app repo to its compose service. portfolio-infra is the
            # compose file itself, handled separately (config-only recreate).
            declare -A REPO_BRANCH=(
              ["/opt/portfolio-infra"]="master"
              ["/opt/sec-financial-intelligence"]="main"
              ["/opt/jd-role-classifier"]="main"
              ["/opt/portfolio-issues-agent"]="main"
              ["/opt/compensation-ingest-api"]="master"
              ["/opt/compensation-benchmarking-explorer"]="master"
              ["/opt/shopify-erp-integration"]="master"
              ["/opt/shopify-order-exception-agent"]="master"
              ["/opt/shopify-inventory-discrepancy-agent"]="master"
              ["/opt/shopify-metaobjects-checkout-demo"]="master"
            )
            # Multi-service values are space-separated; the loop appends them to
            # REBUILD which is passed verbatim to `docker compose up --build`.
            declare -A REPO_SVC=(
              ["/opt/sec-financial-intelligence"]="sec-finint-api"
              ["/opt/jd-role-classifier"]="jd-classifier-api"
              ["/opt/portfolio-issues-agent"]="portfolio-issues-agent"
              ["/opt/compensation-ingest-api"]="compensation-ingest-api compensation-ingest-worker"
              ["/opt/compensation-benchmarking-explorer"]="compensation-explorer-api compensation-explorer-frontend"
              ["/opt/shopify-erp-integration"]="shopify-erp-app"
              ["/opt/shopify-order-exception-agent"]="shopify-order-agent shopify-order-agent-worker"
              ["/opt/shopify-inventory-discrepancy-agent"]="shopify-inventory-agent"
              ["/opt/shopify-metaobjects-checkout-demo"]="shopify-metaobjects-webhook"
            )

            # Pull every repo, recording which ones actually moved. Rebuilding
            # the whole stack on every push is what caused the disk-full and
            # command-timeout failures — a one-line fix to one app should not
            # rebuild something unrelated for one-line fix in another service.
            # Map each repo dir to its github repo so the loop can auto-clone
            # a new project the first time it appears in REPO_BRANCH. Without
            # this the workflow errors with "No such file or directory" until
            # someone manually ssh's in to clone — which I just hit on the oci
            # first deploy.
            declare -A REPO_URL=(
              ["/opt/portfolio-infra"]="https://github.com/odanree/portfolio-infra.git"
              ["/opt/sec-financial-intelligence"]="https://github.com/odanree/sec-financial-intelligence.git"
              ["/opt/jd-role-classifier"]="https://github.com/odanree/jd-role-classifier.git"
              ["/opt/portfolio-issues-agent"]="https://github.com/odanree/portfolio-issues-agent.git"
              ["/opt/compensation-ingest-api"]="https://github.com/odanree/compensation-ingest-api.git"
              ["/opt/compensation-benchmarking-explorer"]="https://github.com/odanree/solar-cost-explorer.git"
              ["/opt/shopify-erp-integration"]="https://github.com/odanree/shopify-erp-integration.git"
              ["/opt/shopify-order-exception-agent"]="https://github.com/odanree/shopify-order-exception-agent.git"
              ["/opt/shopify-inventory-discrepancy-agent"]="https://github.com/odanree/shopify-inventory-discrepancy-agent.git"
              ["/opt/shopify-metaobjects-checkout-demo"]="https://github.com/odanree/shopify-metaobjects-checkout-demo.git"
            )

            REBUILD=""
            INFRA_CHANGED=0
            for dir in "${!REPO_BRANCH[@]}"; do
              if [ ! -d "$dir/.git" ]; then
                echo ">> Cloning ${REPO_URL[$dir]} into $dir (first deploy)"
                git clone --branch "${REPO_BRANCH[$dir]}" "${REPO_URL[$dir]}" "$dir"
                # Treat as a fresh build so the new service goes up immediately.
                if [ "$dir" = "/opt/portfolio-infra" ]; then
                  INFRA_CHANGED=1
                else
                  REBUILD="$REBUILD ${REPO_SVC[$dir]}"
                fi
                continue
              fi
              cd "$dir"
              before=$(git rev-parse HEAD)
              git pull origin "${REPO_BRANCH[$dir]}"
              after=$(git rev-parse HEAD)
              [ "$before" = "$after" ] && continue
              if [ "$dir" = "/opt/portfolio-infra" ]; then
                INFRA_CHANGED=1
              else
                REBUILD="$REBUILD ${REPO_SVC[$dir]}"
              fi
            done

            cd /opt/portfolio-infra

            if [ "${FORCE_REBUILD:-}" = "true" ]; then
              echo ">> Manual full rebuild requested"
              docker builder prune -f >/dev/null 2>&1 || true
              docker compose up -d --build --remove-orphans
            else
              if [ -n "$REBUILD" ]; then
                echo ">> Rebuilding changed services:$REBUILD"
                # Free dangling layers first so heavy rebuilds don't hit the disk
                # wall (volumes are preserved — only unused build artifacts go).
                docker builder prune -f >/dev/null 2>&1 || true
                docker compose up -d --build --remove-orphans $REBUILD
              fi
              if [ "$INFRA_CHANGED" = "1" ]; then
                # Compose file moved: recreate containers whose definition changed.
                # No --build, so unchanged service images are reused (cheap).
                echo ">> portfolio-infra changed — applying compose config"
                docker compose up -d --remove-orphans
              fi
              if [ -z "$REBUILD" ] && [ "$INFRA_CHANGED" = "0" ]; then
                echo ">> No source changes — ensuring stack is up"
                docker compose up -d --remove-orphans
              fi
            fi

            # Caddy's admin API on :2019 can take a beat to bind after a
            # container recreate, so the reload can race and fail with
            # "connect: connection refused". Retry briefly so the deploy
            # doesn't go red on a spurious timing issue.
            for attempt in 1 2 3 4 5; do
              if docker exec portfolio-caddy caddy reload --config /etc/caddy/Caddyfile; then
                break
              fi
              echo ">> caddy reload attempt $attempt failed, retrying..."
              sleep 2
            done

            # Surface what's actually running so a stale image is obvious in logs.
            docker compose ps --format 'table {{.Name}}\t{{.Status}}\t{{.Image}}'
