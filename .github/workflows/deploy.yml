name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {}   # allow manual re-deploy from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 65.108.243.192
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}
          # Rebuilding several heavy services (CUDA torch, frontends) takes a
          # while; the default 10m command timeout is too short.
          command_timeout: 30m
          script: |
            # Fail the deploy on ANY error. Without this, a mid-script failure
            # (e.g. a build error or disk-full) is swallowed and the workflow
            # reports success while containers keep running stale images — which
            # is exactly how a pushed fix silently failed to deploy.
            set -euo pipefail

            cd /opt/portfolio-infra && git pull origin master
            cd /opt/sec-financial-intelligence && git pull origin main
            cd /opt/jd-role-classifier && git pull origin main
            cd /opt/parking-enforcement-detector && git pull origin master

            cd /opt/portfolio-infra
            # Free dangling layers/cache first so heavy rebuilds don't hit the
            # disk wall (volumes are preserved — only unused build artifacts go).
            docker builder prune -f >/dev/null 2>&1 || true

            # Cache-based rebuild + recreate. --build rebuilds changed services
            # (COPY layer invalidates on pulled code); set -e makes any build
            # failure fail the deploy loudly instead of leaving a stale image.
            docker compose up -d --build --remove-orphans
            docker exec portfolio-caddy caddy reload --config /etc/caddy/Caddyfile

            # Surface what's actually running so a stale image is obvious in logs.
            docker compose ps --format 'table {{.Name}}\t{{.Status}}\t{{.Image}}'
