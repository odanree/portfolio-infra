name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 65.108.243.192
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          known_hosts: ${{ secrets.VPS_KNOWN_HOSTS }}
          script: |
            cd /opt/portfolio-infra
            git pull origin master
            docker compose up -d --build
