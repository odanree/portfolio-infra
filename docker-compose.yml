services:

  # ── Shared Infrastructure ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PORTFOLIO_DB_PASSWORD}
      PORTFOLIO_DB_PASSWORD: ${PORTFOLIO_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c 'max_connections=200'
        -c 'shared_buffers=256MB'
        -c 'effective_cache_size=512MB'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-net

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-net

  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    networks:
      - portfolio-net
      - lumen_lumen-net
      - adu-dashboard_adu-net
      - beacon_jsp-net
    depends_on:
      - compensation-ingest-api
      - compensation-explorer-api
      - compensation-explorer-frontend
      - shopify-erp-app
      - shopify-order-agent
      - shopify-inventory-agent
      - shopify-metaobjects-webhook
      - sec-finint-api
      - jd-classifier-api
      - wordpress

  # ── Headless WordPress CMS ───────────────────────────────────────────────────

  wordpress-db:
    image: mysql:8.0
    container_name: portfolio-wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WP_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - wordpress_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - portfolio-net

  wordpress:
    image: wordpress:php8.3-apache
    container_name: portfolio-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define('HEADLESS_API_TOKEN', '${WP_HEADLESS_API_TOKEN}');
        define('NEXT_REVALIDATE_URL', '${WP_NEXT_REVALIDATE_URL}');
        define('REVALIDATION_SECRET', '${WP_REVALIDATION_SECRET}');
        define('WP_HOME', 'https://cms.${DOMAIN}');
        define('WP_SITEURL', 'https://cms.${DOMAIN}');
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      wordpress-db:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Compensation Ingest API (Django + Celery) ─────────────────────────────────

  compensation-ingest-api:
    build:
      context: ../compensation-ingest-api
      dockerfile: Dockerfile
    container_name: compensation-ingest-api
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/compensation_ingest
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${INGEST_SECRET_KEY}
      ALLOWED_HOSTS: compensation-ingest.${DOMAIN}
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  compensation-ingest-worker:
    build:
      context: ../compensation-ingest-api
      dockerfile: Dockerfile
    container_name: compensation-ingest-worker
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --concurrency 2
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/compensation_ingest
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${INGEST_SECRET_KEY}
      ALLOWED_HOSTS: compensation-ingest.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Compensation Benchmarking Explorer (Django GraphQL + Next.js) ─────────────

  compensation-explorer-api:
    build:
      context: ../compensation-benchmarking-explorer/backend
      dockerfile: Dockerfile
    container_name: compensation-explorer-api
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_bands --no-color &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/compensation_explorer
      SECRET_KEY: ${EXPLORER_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: compensation-explorer.${DOMAIN}
      CORS_ALLOWED_ORIGINS: https://compensation-explorer.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

  compensation-explorer-frontend:
    build:
      context: ../compensation-benchmarking-explorer/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: https://compensation-explorer.${DOMAIN}/graphql/
    container_name: compensation-explorer-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - portfolio-net
    depends_on:
      - compensation-explorer-api

  # ── Shopify ERP Integration (Node.js) ─────────────────────────────────────────

  shopify-erp-app:
    build:
      context: ../shopify-erp-integration
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-erp-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_API_KEY: ${SHOPIFY_ERP_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ERP_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ERP_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ERP_SHOP_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ERP_ACCESS_TOKEN}
    networks:
      - portfolio-net

  # ── Shopify Order Exception Agent (Python + worker) ───────────────────────────

  shopify-order-agent:
    build:
      context: ../shopify-order-exception-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-order-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/order_exception_agent
      REDIS_URL: redis://redis:6379/1
      SHOPIFY_API_KEY: ${SHOPIFY_ORDER_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ORDER_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ORDER_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ORDER_STORE_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ORDER_ACCESS_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_ORDER}
      SLACK_WEBHOOK_URL: ${SHOPIFY_ORDER_SLACK_WEBHOOK_URL}
      AGENT_MODE: shadow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  shopify-order-agent-worker:
    build:
      context: ../shopify-order-exception-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-order-agent-worker
    restart: unless-stopped
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/order_exception_agent
      REDIS_URL: redis://redis:6379/1
      SHOPIFY_API_KEY: ${SHOPIFY_ORDER_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ORDER_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ORDER_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ORDER_STORE_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ORDER_ACCESS_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_ORDER}
      SLACK_WEBHOOK_URL: ${SHOPIFY_ORDER_SLACK_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Shopify Inventory Discrepancy Agent (Python) ──────────────────────────────

  shopify-inventory-agent:
    build:
      context: ../shopify-inventory-discrepancy-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-inventory-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/inventory_discrepancy
      REDIS_URL: redis://redis:6379/2
      SHOPIFY_API_KEY: ${SHOPIFY_INVENTORY_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_INVENTORY_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_INVENTORY_WEBHOOK_SECRET}
      SHOPIFY_STORE_DOMAIN: ${SHOPIFY_INVENTORY_STORE_DOMAIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_INVENTORY}
      SLACK_WEBHOOK_URL: ${SHOPIFY_INVENTORY_SLACK_WEBHOOK_URL}
      SLACK_SIGNING_SECRET: ${SHOPIFY_INVENTORY_SLACK_SIGNING_SECRET}
      AGENT_MODE: shadow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Shopify Metaobjects Webhook Server ────────────────────────────────────────
  # Note: Only the webhook server component is deployed here.
  # The checkout UI extension itself runs within Shopify's infrastructure
  # and is deployed via `shopify app deploy` from the project directory.

  shopify-metaobjects-webhook:
    build:
      context: ../shopify-metaobjects-checkout-demo
      dockerfile: Dockerfile
    container_name: shopify-metaobjects-webhook
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_API_KEY: ${SHOPIFY_METAOBJECTS_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_METAOBJECTS_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_METAOBJECTS_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_METAOBJECTS_SHOP_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_METAOBJECTS_ACCESS_TOKEN}
    networks:
      - portfolio-net

  # ── SEC Financial Intelligence API (FastAPI + EDGAR + Azure AI) ───────────────

  sec-finint-api:
    build:
      context: ../sec-financial-intelligence
      dockerfile: Dockerfile
    container_name: sec-finint-api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/sec_financial_intelligence
      AZURE_DOC_INTELLIGENCE_ENDPOINT: ${SEC_FININT_AZURE_DOC_ENDPOINT}
      AZURE_DOC_INTELLIGENCE_KEY: ${SEC_FININT_AZURE_DOC_KEY}
      AZURE_OPENAI_ENDPOINT: ${SEC_FININT_AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${SEC_FININT_AZURE_OPENAI_KEY}
      AZURE_OPENAI_DEPLOYMENT: ${SEC_FININT_AZURE_OPENAI_DEPLOYMENT:-gpt-4}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${SEC_FININT_AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      MOCK_AZURE: ${SEC_FININT_MOCK_AZURE:-false}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Parking Enforcement Detector (FastAPI + YOLO + Claude VLM) ──────────────

  parking-detector:
    build:
      context: ../parking-enforcement-detector
    container_name: parking-detector
    restart: unless-stopped
    environment:
      VLM_BACKEND: claude
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_DETECTOR}
      RTSP_URL: ${PED_RTSP_URL:-}
      VIDEO_PATH: ${PED_VIDEO_PATH:-}
      VIDEO_LOOP: ${PED_VIDEO_LOOP:-false}
      YOLO_MODEL: yolov8n.pt
      INFERENCE_THRESHOLD: "0.20"
      INPUT_WIDTH: "1280"
      INPUT_HEIGHT: "720"
      LOG_LEVEL: INFO
      ALERT_EMAIL: ${PED_ALERT_EMAIL:-}
      SMTP_USER: ${PED_SMTP_USER:-}
      SMTP_PASS: ${PED_SMTP_PASS:-}
    volumes:
      - ../parking-enforcement-detector/config:/app/config
      - ped_snapshots:/app/snapshots
      - ped_logs:/app/logs
    networks:
      - portfolio-net
    # Uncomment on a GPU server:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── JD Role Classifier API (FastAPI + spaCy + BERT + LoRA) ───────────────────

  jd-classifier-api:
    build:
      context: ../jd-role-classifier
      dockerfile: Dockerfile
    container_name: jd-classifier-api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/jd_role_classifier
      MOCK_NLP: "false"
      LOAD_CLASSIFIER: "false"
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  wordpress_data:
  wordpress_db:
  ped_snapshots:
  ped_logs:

networks:
  portfolio-net:
    driver: bridge
  lumen_lumen-net:
    external: true
  adu-dashboard_adu-net:
    external: true
  beacon_jsp-net:
    external: true
