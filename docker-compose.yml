services:

  # ── Shared Infrastructure ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PORTFOLIO_DB_PASSWORD}
      PORTFOLIO_DB_PASSWORD: ${PORTFOLIO_DB_PASSWORD}
    ports:
      - "127.0.0.1:15434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c 'max_connections=200'
        -c 'shared_buffers=256MB'
        -c 'effective_cache_size=512MB'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-net

  redis:
    image: redis:7-alpine
    container_name: portfolio-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-net

  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    networks:
      - portfolio-net
      - lumen_lumen-net
      - adu-dashboard_adu-net
      - beacon_jsp-net
    depends_on:
      - compensation-ingest-api
      - compensation-explorer-api
      - compensation-explorer-frontend
      - shopify-erp-app
      - shopify-order-agent
      - shopify-inventory-agent
      - shopify-metaobjects-webhook
      - portfolio-issues-agent
      - sec-finint-api
      - jd-classifier-api
      - oci-api
      - oci-web
      - wordpress

  # ── Headless WordPress CMS ───────────────────────────────────────────────────

  wordpress-db:
    image: mysql:8.0
    container_name: portfolio-wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WP_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - wordpress_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - portfolio-net

  wordpress:
    image: wordpress:php8.3-apache
    container_name: portfolio-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define('HEADLESS_API_TOKEN', '${WP_HEADLESS_API_TOKEN}');
        define('NEXT_REVALIDATE_URL', '${WP_NEXT_REVALIDATE_URL}');
        define('REVALIDATION_SECRET', '${WP_REVALIDATION_SECRET}');
        define('WP_HOME', 'https://cms.${DOMAIN}');
        define('WP_SITEURL', 'https://cms.${DOMAIN}');
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      wordpress-db:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Compensation Ingest API (Django + Celery) ─────────────────────────────────

  compensation-ingest-api:
    build:
      context: ../compensation-ingest-api
      dockerfile: Dockerfile
    container_name: compensation-ingest-api
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/compensation_ingest
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${INGEST_SECRET_KEY}
      ALLOWED_HOSTS: compensation-ingest.${DOMAIN}
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  compensation-ingest-worker:
    build:
      context: ../compensation-ingest-api
      dockerfile: Dockerfile
    container_name: compensation-ingest-worker
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --concurrency 2
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/compensation_ingest
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${INGEST_SECRET_KEY}
      ALLOWED_HOSTS: compensation-ingest.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Compensation Benchmarking Explorer (Django GraphQL + Next.js) ─────────────

  compensation-explorer-api:
    build:
      context: ../compensation-benchmarking-explorer/backend
      dockerfile: Dockerfile
    container_name: compensation-explorer-api
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_bands --no-color &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/compensation_explorer
      SECRET_KEY: ${EXPLORER_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: compensation-explorer.${DOMAIN}
      CORS_ALLOWED_ORIGINS: https://compensation-explorer.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

  compensation-explorer-frontend:
    build:
      context: ../compensation-benchmarking-explorer/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: https://compensation-explorer.${DOMAIN}/graphql/
    container_name: compensation-explorer-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - portfolio-net
    depends_on:
      - compensation-explorer-api

  # ── Shopify ERP Integration (Node.js) ─────────────────────────────────────────

  shopify-erp-app:
    build:
      context: ../shopify-erp-integration
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-erp-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_API_KEY: ${SHOPIFY_ERP_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ERP_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ERP_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ERP_SHOP_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ERP_ACCESS_TOKEN}
    networks:
      - portfolio-net

  # ── Shopify Order Exception Agent (Python + worker) ───────────────────────────

  shopify-order-agent:
    build:
      context: ../shopify-order-exception-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-order-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/order_exception_agent
      REDIS_URL: redis://redis:6379/1
      SHOPIFY_API_KEY: ${SHOPIFY_ORDER_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ORDER_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ORDER_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ORDER_STORE_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ORDER_ACCESS_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_ORDER}
      SLACK_WEBHOOK_URL: ${SHOPIFY_ORDER_SLACK_WEBHOOK_URL}
      AGENT_MODE: shadow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  shopify-order-agent-worker:
    build:
      context: ../shopify-order-exception-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-order-agent-worker
    restart: unless-stopped
    command: python -m app.worker
    # The shared image's HEALTHCHECK curls :8000/health, but the worker runs no
    # web server, so it would always report unhealthy. Disable it — the worker
    # is PID 1 under restart: unless-stopped, so a dead process is recreated.
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/order_exception_agent
      REDIS_URL: redis://redis:6379/1
      SHOPIFY_API_KEY: ${SHOPIFY_ORDER_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ORDER_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ORDER_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ORDER_STORE_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ORDER_ACCESS_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_ORDER}
      SLACK_WEBHOOK_URL: ${SHOPIFY_ORDER_SLACK_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Shopify Inventory Discrepancy Agent (Python) ──────────────────────────────

  shopify-inventory-agent:
    build:
      context: ../shopify-inventory-discrepancy-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-inventory-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/inventory_discrepancy
      REDIS_URL: redis://redis:6379/2
      SHOPIFY_API_KEY: ${SHOPIFY_INVENTORY_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_INVENTORY_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_INVENTORY_WEBHOOK_SECRET}
      SHOPIFY_STORE_DOMAIN: ${SHOPIFY_INVENTORY_STORE_DOMAIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_INVENTORY}
      SLACK_WEBHOOK_URL: ${SHOPIFY_INVENTORY_SLACK_WEBHOOK_URL}
      SLACK_SIGNING_SECRET: ${SHOPIFY_INVENTORY_SLACK_SIGNING_SECRET}
      AGENT_MODE: shadow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Portfolio Issues Agent (LangGraph + Slack HITL → GitHub issues) ──────────

  portfolio-issues-agent:
    build:
      context: ../portfolio-issues-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: portfolio-issues-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/portfolio_issues_agent
      REDIS_URL: redis://redis:6379/3
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_ISSUES}
      AGENT_MODEL: ${PORTFOLIO_ISSUES_AGENT_MODEL:-claude-sonnet-4-6}
      BEACON_API_URL: ${BEACON_API_URL:-https://beacon.${DOMAIN}}
      BEACON_JWT: ${PORTFOLIO_ISSUES_BEACON_JWT}
      GITHUB_TOKEN: ${PORTFOLIO_ISSUES_GITHUB_TOKEN}
      SLACK_BOT_TOKEN: ${PORTFOLIO_ISSUES_SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${PORTFOLIO_ISSUES_SLACK_SIGNING_SECRET}
      SLACK_CHANNEL_ID: ${PORTFOLIO_ISSUES_SLACK_CHANNEL_ID}
      AUDIT_CRON_DAY_OF_WEEK: ${PORTFOLIO_ISSUES_CRON_DAY_OF_WEEK:-sun}
      AUDIT_CRON_HOUR: ${PORTFOLIO_ISSUES_CRON_HOUR:-9}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Shopify Metaobjects Webhook Server ────────────────────────────────────────
  # Note: Only the webhook server component is deployed here.
  # The checkout UI extension itself runs within Shopify's infrastructure
  # and is deployed via `shopify app deploy` from the project directory.

  shopify-metaobjects-webhook:
    build:
      context: ../shopify-metaobjects-checkout-demo
      dockerfile: Dockerfile
    container_name: shopify-metaobjects-webhook
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_API_KEY: ${SHOPIFY_METAOBJECTS_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_METAOBJECTS_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_METAOBJECTS_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_METAOBJECTS_SHOP_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_METAOBJECTS_ACCESS_TOKEN}
    networks:
      - portfolio-net

  # ── SEC Financial Intelligence API (FastAPI + EDGAR + Azure AI) ───────────────

  sec-finint-api:
    build:
      context: ../sec-financial-intelligence
      dockerfile: Dockerfile
    container_name: sec-finint-api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/sec_financial_intelligence
      AZURE_DOC_INTELLIGENCE_ENDPOINT: ${SEC_FININT_AZURE_DOC_ENDPOINT}
      AZURE_DOC_INTELLIGENCE_KEY: ${SEC_FININT_AZURE_DOC_KEY}
      AZURE_OPENAI_ENDPOINT: ${SEC_FININT_AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${SEC_FININT_AZURE_OPENAI_KEY}
      AZURE_OPENAI_DEPLOYMENT: ${SEC_FININT_AZURE_OPENAI_DEPLOYMENT:-gpt-4}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${SEC_FININT_AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      MOCK_AZURE: ${SEC_FININT_MOCK_AZURE:-false}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Parking Enforcement Detector (FastAPI + YOLO + Claude VLM) ──────────────

  parking-detector:
    build:
      context: ../parking-enforcement-detector
    container_name: parking-detector
    restart: unless-stopped
    environment:
      VLM_BACKEND: mock
      RTSP_URL: ${PED_RTSP_URL:-}
      VIDEO_PATH: /app/demo
      VIDEO_LOOP: "true"
      VIDEO_SPEED: "4"
      INITIAL_PAUSED: "true"
      YOLO_MODEL: yolov8n.pt
      INFERENCE_THRESHOLD: "0.20"
      INPUT_WIDTH: "1280"
      INPUT_HEIGHT: "720"
      LOG_LEVEL: INFO
      DEMO_MODE: "true"
      PE_WINDOW_ENABLED: "true"
      PE_WINDOW_START: "8"
      PE_WINDOW_END: "16"
      ALERT_EMAIL: ${PED_ALERT_EMAIL:-}
      SMTP_USER: ${PED_SMTP_USER:-}
      SMTP_PASS: ${PED_SMTP_PASS:-}
    volumes:
      - ../parking-enforcement-detector/config:/app/config
      - /opt/demo-videos:/app/demo:ro
      - ped_snapshots:/app/snapshots
      - ped_logs:/app/logs
      - ped_dataset:/app/dataset
      - ped_vectors:/app/data/vectors
    networks:
      - portfolio-net
    # Uncomment on a GPU server:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── JD Role Classifier API (FastAPI + spaCy + BERT + LoRA) ───────────────────

  jd-classifier-api:
    build:
      context: ../jd-role-classifier
      dockerfile: Dockerfile
    container_name: jd-classifier-api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/jd_role_classifier
      MOCK_NLP: "false"
      LOAD_CLASSIFIER: "false"
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── OC Real Estate Intel (FastAPI + LangGraph + Next.js) ─────────────────────

  oci-qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: oci-qdrant
    restart: unless-stopped
    volumes:
      - oci_qdrant_data:/qdrant/storage
    networks:
      - portfolio-net

  oci-neo4j:
    image: neo4j:5.20-community
    container_name: oci-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${OCI_NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - oci_neo4j_data:/data
    networks:
      - portfolio-net

  oci-api:
    build:
      context: ../oc-realestate-intel
      dockerfile: Dockerfile
    container_name: oci-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/oci
      QDRANT_URL: http://oci-qdrant:6333
      QDRANT_COLLECTION: parcels
      NEO4J_URI: bolt://oci-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${OCI_NEO4J_PASSWORD}
      ANTHROPIC_API_KEY: ${OCI_ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: claude-sonnet-4-6
      LANGFUSE_PUBLIC_KEY: ${OCI_LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${OCI_LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${OCI_LANGFUSE_HOST:-https://us.cloud.langfuse.com}
      LOG_LEVEL: INFO
      # 10k parcels across the four biggest OC cities. Entrypoint script
      # respects --skip-if-seeded so this is a no-op on container restart.
      OCI_SEED_LIMIT: "10000"
      OCI_SEED_WHERE: >-
        (SITE_ADDRESS LIKE '%IRVINE%' OR SITE_ADDRESS LIKE '%NEWPORT BEACH%'
         OR SITE_ADDRESS LIKE '%ANAHEIM%' OR SITE_ADDRESS LIKE '% ORANGE%')
    depends_on:
      postgres:
        condition: service_healthy
      oci-qdrant:
        condition: service_started
      oci-neo4j:
        condition: service_started
    networks:
      - portfolio-net

  oci-web:
    build:
      context: ../oc-realestate-intel/web
      dockerfile: Dockerfile
      args:
        # Build-time injection — Next bakes NEXT_PUBLIC_* into the client bundle.
        # Same-origin so the browser hits the same domain Caddy already terminated.
        NEXT_PUBLIC_API_BASE: https://oci.${DOMAIN}
    container_name: oci-web
    restart: unless-stopped
    depends_on:
      - oci-api
    networks:
      - portfolio-net

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  wordpress_data:
  wordpress_db:
  ped_snapshots:
  ped_logs:
  ped_dataset:
  ped_vectors:
  oci_qdrant_data:
  oci_neo4j_data:

networks:
  portfolio-net:
    driver: bridge
  lumen_lumen-net:
    external: true
  adu-dashboard_adu-net:
    external: true
  beacon_jsp-net:
    external: true
