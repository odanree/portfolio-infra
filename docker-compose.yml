services:

  # ── Shared Infrastructure ────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PORTFOLIO_DB_PASSWORD}
      PORTFOLIO_DB_PASSWORD: ${PORTFOLIO_DB_PASSWORD}
    ports:
      - "127.0.0.1:15434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c 'max_connections=200'
        -c 'shared_buffers=256MB'
        -c 'effective_cache_size=512MB'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-net

  redis:
    # Redis Stack is a superset of base Redis — same wire protocol, same
    # data dir, plus the RediSearch/JSON modules that langgraph-checkpoint-redis
    # needs (FT.* commands). Without it, portfolio-issues-agent and
    # shopify-inventory-agent both fell back to in-memory checkpointers and
    # lost HITL state across container restarts.
    image: redis/redis-stack-server:7.4.0-v3
    container_name: portfolio-redis
    restart: unless-stopped
    environment:
      REDIS_ARGS: --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - portfolio-net

  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Bind-mount the directory, not the Caddyfile itself. git pull rewrites
      # the file by rename, which leaves a bind-mounted FILE pointing at the
      # old inode — a subsequent `caddy reload` then reads the stale file.
      # Mounting the directory keeps the inode stable so reloads always see
      # the current contents.
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    networks:
      - portfolio-net
      - external-net-1
      - external-net-2
      - external-net-3
    depends_on:
      - solar-ingest-api
      - solar-cost-explorer-api
      - solar-cost-explorer-frontend
      - solar-advisor-api
      - shopify-erp-app
      - shopify-order-agent
      - shopify-inventory-agent
      - shopify-metaobjects-webhook
      - portfolio-issues-agent
      - sec-finint-api
      - jd-classifier-api
      - wordpress

  # ── Headless WordPress CMS ───────────────────────────────────────────────────

  wordpress-db:
    image: mysql:8.0
    container_name: portfolio-wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WP_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WP_DB_ROOT_PASSWORD}
    volumes:
      - wordpress_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - portfolio-net

  wordpress:
    image: wordpress:php8.3-apache
    container_name: portfolio-wordpress
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define('HEADLESS_API_TOKEN', '${WP_HEADLESS_API_TOKEN}');
        define('NEXT_REVALIDATE_URL', '${WP_NEXT_REVALIDATE_URL}');
        define('REVALIDATION_SECRET', '${WP_REVALIDATION_SECRET}');
        define('WP_HOME', 'https://cms.${DOMAIN}');
        define('WP_SITEURL', 'https://cms.${DOMAIN}');
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      wordpress-db:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Solar Installation Quote Ingest API (Django + Celery) ────────────────────

  solar-ingest-api:
    build:
      context: ../solar-ingest-api
      dockerfile: Dockerfile
    container_name: solar-ingest-api
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/solar_ingest
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${INGEST_SECRET_KEY}
      ALLOWED_HOSTS: solar-ingest.${DOMAIN}
      DEBUG: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  solar-ingest-worker:
    build:
      context: ../solar-ingest-api
      dockerfile: Dockerfile
    container_name: solar-ingest-worker
    restart: unless-stopped
    command: celery -A config.celery worker --loglevel=info --concurrency 2
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/solar_ingest
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${INGEST_SECRET_KEY}
      ALLOWED_HOSTS: solar-ingest.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Solar Advisor Agent (LangGraph + FastAPI) ───────────────────────────────
  # Composite-data agent. Calls Solar Cost Explorer GraphQL + NREL PVWatts +
  # DSIRE + EIA to answer NL solar-economics questions.

  solar-advisor-api:
    build:
      context: ../solar-advisor-agent
      dockerfile: Dockerfile
    container_name: solar-advisor-api
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NREL_API_KEY: ${NREL_API_KEY}
      EIA_API_KEY: ${EIA_API_KEY}
      SOLAR_COST_GRAPHQL_URL: https://solar.${DOMAIN}/graphql/
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LOG_LEVEL: INFO
    networks:
      - portfolio-net

  # ── Solar Cost Explorer (Django GraphQL + Next.js) ──────────────────────────

  solar-cost-explorer-api:
    build:
      context: ../solar-cost-explorer/backend
      dockerfile: Dockerfile
    container_name: solar-cost-explorer-api
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_bands --no-color &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DATABASE_URL: postgres://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/solar_cost_explorer
      SECRET_KEY: ${EXPLORER_SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: solar.${DOMAIN}
      CORS_ALLOWED_ORIGINS: https://solar.${DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

  solar-cost-explorer-frontend:
    build:
      context: ../solar-cost-explorer/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GRAPHQL_URL: https://solar.${DOMAIN}/graphql/
    container_name: solar-cost-explorer-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - portfolio-net
    depends_on:
      - solar-cost-explorer-api

  # ── Shopify ERP Integration (Node.js) ─────────────────────────────────────────

  shopify-erp-app:
    build:
      context: ../shopify-erp-integration
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-erp-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_API_KEY: ${SHOPIFY_ERP_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ERP_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ERP_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ERP_SHOP_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ERP_ACCESS_TOKEN}
    networks:
      - portfolio-net

  # ── Shopify Order Exception Agent (Python + worker) ───────────────────────────

  shopify-order-agent:
    build:
      context: ../shopify-order-exception-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-order-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/order_exception_agent
      REDIS_URL: redis://redis:6379/1
      SHOPIFY_API_KEY: ${SHOPIFY_ORDER_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ORDER_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ORDER_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ORDER_STORE_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ORDER_ACCESS_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_ORDER}
      SLACK_WEBHOOK_URL: ${SHOPIFY_ORDER_SLACK_WEBHOOK_URL}
      AGENT_MODE: shadow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  shopify-order-agent-worker:
    build:
      context: ../shopify-order-exception-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-order-agent-worker
    restart: unless-stopped
    command: python -m app.worker
    # The shared image's HEALTHCHECK curls :8000/health, but the worker runs no
    # web server, so it would always report unhealthy. Disable it — the worker
    # is PID 1 under restart: unless-stopped, so a dead process is recreated.
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/order_exception_agent
      REDIS_URL: redis://redis:6379/1
      SHOPIFY_API_KEY: ${SHOPIFY_ORDER_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_ORDER_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_ORDER_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_ORDER_STORE_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ORDER_ACCESS_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_ORDER}
      SLACK_WEBHOOK_URL: ${SHOPIFY_ORDER_SLACK_WEBHOOK_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Shopify Inventory Discrepancy Agent (Python) ──────────────────────────────

  shopify-inventory-agent:
    build:
      context: ../shopify-inventory-discrepancy-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: shopify-inventory-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/inventory_discrepancy
      REDIS_URL: redis://redis:6379/2
      SHOPIFY_API_KEY: ${SHOPIFY_INVENTORY_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_INVENTORY_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_INVENTORY_WEBHOOK_SECRET}
      SHOPIFY_STORE_DOMAIN: ${SHOPIFY_INVENTORY_STORE_DOMAIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_INVENTORY}
      SLACK_WEBHOOK_URL: ${SHOPIFY_INVENTORY_SLACK_WEBHOOK_URL}
      SLACK_SIGNING_SECRET: ${SHOPIFY_INVENTORY_SLACK_SIGNING_SECRET}
      AGENT_MODE: shadow
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Portfolio Issues Agent (LangGraph + Slack HITL → GitHub issues) ──────────

  portfolio-issues-agent:
    build:
      context: ../portfolio-issues-agent
      dockerfile: Dockerfile
      target: runtime
    container_name: portfolio-issues-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/portfolio_issues_agent
      # langgraph-checkpoint-redis uses RediSearch (FT.*), which can only
      # create indexes on Redis db 0. Other compose services already split
      # across /1, /2 — /0 was unallocated so we land there.
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY_ISSUES}
      AGENT_MODEL: ${PORTFOLIO_ISSUES_AGENT_MODEL:-claude-sonnet-4-6}
      BEACON_API_URL: ${BEACON_API_URL:-https://beacon.${DOMAIN}}
      BEACON_JWT: ${PORTFOLIO_ISSUES_BEACON_JWT}
      GITHUB_TOKEN: ${PORTFOLIO_ISSUES_GITHUB_TOKEN}
      SLACK_BOT_TOKEN: ${PORTFOLIO_ISSUES_SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${PORTFOLIO_ISSUES_SLACK_SIGNING_SECRET}
      SLACK_CHANNEL_ID: ${PORTFOLIO_ISSUES_SLACK_CHANNEL_ID}
      AUDIT_CRON_DAY_OF_WEEK: ${PORTFOLIO_ISSUES_CRON_DAY_OF_WEEK:-sun}
      AUDIT_CRON_HOUR: ${PORTFOLIO_ISSUES_CRON_HOUR:-9}
      MAX_PROPOSALS_PER_RUN: ${PORTFOLIO_ISSUES_MAX_PROPOSALS_PER_RUN:-5}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── Shopify Metaobjects Webhook Server ────────────────────────────────────────
  # Note: Only the webhook server component is deployed here.
  # The checkout UI extension itself runs within Shopify's infrastructure
  # and is deployed via `shopify app deploy` from the project directory.

  shopify-metaobjects-webhook:
    build:
      context: ../shopify-metaobjects-checkout-demo
      dockerfile: Dockerfile
    container_name: shopify-metaobjects-webhook
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      SHOPIFY_API_KEY: ${SHOPIFY_METAOBJECTS_API_KEY}
      SHOPIFY_API_SECRET: ${SHOPIFY_METAOBJECTS_API_SECRET}
      SHOPIFY_WEBHOOK_SECRET: ${SHOPIFY_METAOBJECTS_WEBHOOK_SECRET}
      SHOPIFY_SHOP_DOMAIN: ${SHOPIFY_METAOBJECTS_SHOP_DOMAIN}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_METAOBJECTS_ACCESS_TOKEN}
    networks:
      - portfolio-net

  # ── SEC Financial Intelligence API (FastAPI + EDGAR + Azure AI) ───────────────

  sec-finint-api:
    build:
      context: ../sec-financial-intelligence
      dockerfile: Dockerfile
    container_name: sec-finint-api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/sec_financial_intelligence
      AZURE_DOC_INTELLIGENCE_ENDPOINT: ${SEC_FININT_AZURE_DOC_ENDPOINT}
      AZURE_DOC_INTELLIGENCE_KEY: ${SEC_FININT_AZURE_DOC_KEY}
      AZURE_OPENAI_ENDPOINT: ${SEC_FININT_AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_KEY: ${SEC_FININT_AZURE_OPENAI_KEY}
      AZURE_OPENAI_DEPLOYMENT: ${SEC_FININT_AZURE_OPENAI_DEPLOYMENT:-gpt-4}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${SEC_FININT_AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-small}
      MOCK_AZURE: ${SEC_FININT_MOCK_AZURE:-false}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

  # ── JD Role Classifier API (FastAPI + spaCy + BERT + LoRA) ───────────────────

  jd-classifier-api:
    build:
      context: ../jd-role-classifier
      dockerfile: Dockerfile
    container_name: jd-classifier-api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio_user:${PORTFOLIO_DB_PASSWORD}@postgres:5432/jd_role_classifier
      MOCK_NLP: ${JD_CLASSIFIER_MOCK_NLP:-false}
      LOAD_CLASSIFIER: ${JD_CLASSIFIER_LOAD:-false}
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-net

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  wordpress_data:
  wordpress_db:

networks:
  portfolio-net:
    driver: bridge
  # Cross-stack networks that portfolio-caddy joins so it can reverse-proxy
  # to services living in the beacon and lumen compose projects. If either
  # of those projects isn't running on this host, docker compose will fail
  # to attach — set the env var to an empty string in that case.
  #
  # Recovery lesson (2026-07-02): if these values are unset AND the caddy
  # container is recreated fresh, caddy comes up on portfolio-net alone
  # and every proxy_pass to beacon-* / lumen-* returns 502 with
  # "server misbehaving" in the Docker DNS. Defaults below match the
  # network names the beacon and lumen compose projects create; override
  # via .env only if you rename those stacks.
  external-net-1:
    external: true
    name: ${EXTERNAL_NET_1:-beacon_jsp-net}
  external-net-2:
    external: true
    name: ${EXTERNAL_NET_2:-lumen_lumen-net}
  external-net-3:
    external: true
    name: ${EXTERNAL_NET_3:-lumen_monitoring-net}
